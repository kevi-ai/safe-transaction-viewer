<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owockibot Safe Transaction Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .safe-address {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .live-notice {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; margin-top: 0.5rem; }
        .transactions { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .tx-header {
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            display: grid;
            grid-template-columns: 150px 80px 1fr 150px 100px;
            gap: 1rem;
        }
        .tx-row {
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 150px 80px 1fr 150px 100px;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tx-row:hover { background: rgba(255,255,255,0.05); }
        .tx-hash { color: #00d4ff; text-decoration: none; font-family: monospace; font-size: 0.85rem; }
        .tx-hash:hover { text-decoration: underline; }
        .tx-type { padding: 0.25rem 0.5rem; border-radius: 12px; font-size: 0.7rem; text-align: center; }
        .type-in { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .type-out { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .amount-in { color: #00ff88; font-weight: bold; }
        .amount-out { color: #ff4444; font-weight: bold; }
        .recipient { font-family: monospace; font-size: 0.8rem; color: #aaa; }
        .loading, .error { text-align: center; padding: 2rem; color: #888; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 owockibot Safe Transaction Viewer</h1>
            <div class="safe-address">0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be</div>
        </header>
        
        <div class="live-notice">
            🔴 LIVE DATA - Using Safe Transaction Service API
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTx">-</div>
                <div class="stat-label">Total Transfers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalIn">-</div>
                <div class="stat-label">Incoming</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalOut">-</div>
                <div class="stat-label">Outgoing</div>
            </div>
        </div>

        <div class="transactions">
            <div class="tx-header">
                <div>Date</div>
                <div>Type</div>
                <div>Transaction Hash</div>
                <div>From/To</div>
                <div>Value</div>
            </div>
            <div id="txList"><div class="loading">Loading transfers from Safe API...</div></div>
        </div>
    </div>

    <script>
        const SAFE_ADDRESS = '0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be';
        const SAFE_API = 'https://api.safe.global/tx-service/base/api/v1';
        const BASESCAN_URL = 'https://basescan.org/tx/';
        
        const API_TOKEN = 'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzYWZlLWF1dGgtc2VydmljZSIsInN1YiI6IjY2YTZjNjQ5MDU3ODRmOGJhNWY2ZmRhYTA0NzM0NTdmXzZkMDVjZmMyYWI0NjQ1ZjlhMzlkMDYwYzE3NjNjNTMwIiwia2V5IjoiNjZhNmM2NDkwNTc4NGY4YmE1ZjZmZGFhMDQ3MzQ1N2ZfNmQwNWNmYzJhYjQ2NDVmOWEzOWQwNjBjMTc2M2M1MzAiLCJhdWQiOlsic2FmZS1hdXRoLXNlcnZpY2UiXSwiZXhwIjoxODAzODM5MzAxLCJyb2xlcyI6W10sImRhdGEiOnt9fQ.cg-GcUW0otyqXIkjTcKzBUrzLW6X7XJVP2QRseypW1nFbp4nxYL_SnuOd6v55keCJFYIfe6oK2OdiZYYpspnlQ';

        async function fetchTransfers() {
            try {
                const response = await fetch(`${SAFE_API}/safes/${SAFE_ADDRESS}/transfers/`, {
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data.results || [];
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('txList').innerHTML = `<div class="error">Error loading data: ${error.message}</div>`;
                return [];
            }
        }

        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
        }

        function truncateAddress(addr) {
            if (!addr) return '-';
            return addr.slice(0, 6) + '...' + addr.slice(-4);
        }

        function formatValue(value, decimals = 18) {
            if (!value) return '-';
            const val = parseFloat(value) / Math.pow(10, decimals);
            return val.toFixed(4);
        }

        async function renderTransfers(transfers) {
            const txList = document.getElementById('txList');
            
            if (!transfers || transfers.length === 0) {
                txList.innerHTML = '<div class="error">No transfers found</div>';
                return;
            }

            let incoming = 0;
            let outgoing = 0;

            const html = transfers.map(tx => {
                const isIncoming = tx.to.toLowerCase() === SAFE_ADDRESS.toLowerCase();
                if (isIncoming) incoming++;
                else outgoing++;
                
                const typeClass = isIncoming ? 'type-in' : 'type-out';
                const typeLabel = isIncoming ? 'IN' : 'OUT';
                const amountClass = isIncoming ? 'amount-in' : 'amount-out';
                const prefix = isIncoming ? '+' : '-';
                const tokenSymbol = tx.tokenInfo?.symbol || 'ETH';
                const decimals = tx.tokenInfo?.decimals || 18;
                
                return `
                    <div class="tx-row">
                        <div>${formatDate(tx.executionDate)}</div>
                        <div><span class="tx-type ${typeClass}">${typeLabel}</span></div>
                        <div><a href="${BASESCAN_URL}${tx.transactionHash}" target="_blank" class="tx-hash">${truncateAddress(tx.transactionHash)}</a></div>
                        <div class="recipient">${truncateAddress(isIncoming ? tx.from : tx.to)}</div>
                        <div class="${amountClass}">${prefix}${formatValue(tx.value, decimals)} ${tokenSymbol}</div>
                    </div>
                `;
            }).join('');

            txList.innerHTML = html;
            document.getElementById('totalTx').textContent = transfers.length;
            document.getElementById('totalIn').textContent = incoming;
            document.getElementById('totalOut').textContent = outgoing;
        }

        async function init() {
            const transfers = await fetchTransfers();
            renderTransfers(transfers);
        }
        init();
    </script>
</body>
</html>
