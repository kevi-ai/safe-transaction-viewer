<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owockibot Safe Transaction Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .safe-address {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .live-notice {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; margin-top: 0.5rem; }
        .transactions { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .tx-header {
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            display: grid;
            grid-template-columns: 150px 100px 1fr 150px 120px;
            gap: 1rem;
        }
        .tx-row {
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 150px 100px 1fr 150px 120px;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tx-row:hover { background: rgba(255,255,255,0.05); }
        .tx-hash { color: #00d4ff; text-decoration: none; font-family: monospace; font-size: 0.85rem; }
        .tx-hash:hover { text-decoration: underline; }
        .tx-type { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; text-align: center; }
        .type-in { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .type-out { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .amount-in { color: #00ff88; font-weight: bold; }
        .amount-out { color: #ff4444; font-weight: bold; }
        .recipient { font-family: monospace; font-size: 0.8rem; color: #aaa; }
        .loading, .error, .debug { text-align: center; padding: 1rem; color: #888; }
        .error { color: #ff4444; }
        .debug { color: #ffaa00; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 owockibot Safe Transaction Viewer</h1>
            <div class="safe-address">0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be</div>
        </header>
        
        <div class="live-notice">
            🔴 LIVE DATA - Using Safe API
        </div>
        
        <div class="debug" id="debugMsg">Loading transactions...</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTx">-</div>
                <div class="stat-label">Total Transactions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalIn">-</div>
                <div class="stat-label">Total TX</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalOut">-</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="transactions">
            <div class="tx-header">
                <div>Date</div>
                <div>Type</div>
                <div>Hash</div>
                <div>From/To</div>
                <div>Status</div>
            </div>
            <div id="txList"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <script>
        const SAFE_ADDRESS = '0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be';
        const SAFE_API = 'https://safe-transaction-base.safe.global/api/v1';
        const BASESCAN_URL = 'https://basescan.org/tx/';
        
        const API_TOKEN = 'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzYWZlLWF1dGgtc2VydmljZSIsInN1YiI6IjY2YTZjNjQ5MDU3ODRmOGJhNWY2ZmRhYTA0NzM0NTdmXzZkMDVjZmMyYWI0NjQ1ZjlhMzlkMDYwYzE3NjNjNTMwIiwia2V5IjoiNjZhNmM2NDkwNTc4NGY4YmE1ZjZmZGFhMDQ3MzQ1N2ZfNmQwNWNmYzJhYjQ2NDVmOWEzOWQwNjBjMTc2M2M1MzAiLCJhdWQiOlsic2FmZS1hdXRoLXNlcnZpY2UiXSwiZXhwIjoxODAzODM5MzAxLCJyb2xlcyI6W10sImRhdGEiOnt9fQ.cg-GcUW0otyqXIkjTcKzBUrzLW6X7XJVP2QRseypW1nFbp4nxYL_SnuOd6v55keCJFYIfe6oK2OdiZYYpspnlQ';

        async function fetchSafeTransactions() {
            try {
                document.getElementById('debugMsg').textContent = 'Fetching from Safe API...';
                
                const headers = {
                    'Authorization': `Bearer ${API_TOKEN}`,
                    'Content-Type': 'application/json'
                };
                
                // Get Safe info first
                const safeResp = await fetch(`${SAFE_API}/safes/${SAFE_ADDRESS}/`, { headers });
                const safeData = await safeResp.json();
                document.getElementById('debugMsg').textContent = 'Safe found, fetching transactions...';
                
                // Get transactions
                const txResp = await fetch(`${SAFE_API}/transactions/?safe=${SAFE_ADDRESS}&ordering=-timestamp`, { headers });
                const txData = await txResp.json();
                
                if (!txData.results) {
                    document.getElementById('debugMsg').textContent = 'No transactions found';
                    return [];
                }
                
                document.getElementById('debugMsg').textContent = `Found ${txData.results.length} transactions!`;
                return txData.results;
                
            } catch (error) {
                document.getElementById('debugMsg').textContent = 'Error: ' + error.message;
                console.error(error);
                return [];
            }
        }

        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function truncateHash(hash) {
            if (!hash) return '-';
            return hash.slice(0, 10) + '...' + hash.slice(-8);
        }

        function renderTransactions(txs) {
            const txList = document.getElementById('txList');
            if (!txs || txs.length === 0) {
                txList.innerHTML = '<div class="error">No transactions found</div>';
                return;
            }

            const html = txs.slice(0, 50).map(tx => {
                const isExecuted = tx.executionDate != null;
                const type = tx.txType || 'UNKNOWN';
                const hash = tx.transactionHash || tx.safeTxHash;
                
                const typeClass = isExecuted ? 'type-in' : 'type-out';
                const statusLabel = isExecuted ? 'EXECUTED' : 'PENDING';
                
                return `
                    <div class="tx-row">
                        <div>${formatDate(tx.executionDate || tx.submissionDate)}</div>
                        <div><span class="tx-type ${typeClass}">${type}</span></div>
                        <div><a href="${BASESCAN_URL}${hash}" target="_blank" class="tx-hash">${truncateHash(hash)}</a></div>
                        <div class="recipient">${truncateHash(tx.to || tx.safe)}</div>
                        <div><span class="tx-type ${typeClass}">${statusLabel}</span></div>
                    </div>
                `;
            }).join('');

            txList.innerHTML = html;
            document.getElementById('totalTx').textContent = txs.length;
            document.getElementById('totalIn').textContent = txs.filter(t => t.executionDate).length;
            document.getElementById('totalOut').textContent = txs.filter(t => !t.executionDate).length;
        }

        async function init() {
            const txs = await fetchSafeTransactions();
            renderTransactions(txs);
        }
        init();
    </script>
</body>
</html>
