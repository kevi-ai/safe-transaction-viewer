<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owockibot Safe Transaction Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .safe-address {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .live-notice {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #888; margin-top: 0.5rem; }
        .transactions { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .tx-header {
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            display: grid;
            grid-template-columns: 150px 100px 1fr 150px 120px;
            gap: 1rem;
        }
        .tx-row {
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 150px 100px 1fr 150px 120px;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tx-row:hover { background: rgba(255,255,255,0.05); }
        .tx-hash { color: #00d4ff; text-decoration: none; font-family: monospace; font-size: 0.85rem; }
        .tx-hash:hover { text-decoration: underline; }
        .tx-type { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; text-align: center; }
        .type-executed { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .type-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .amount { color: #00d4ff; font-weight: bold; }
        .recipient { font-family: monospace; font-size: 0.8rem; color: #aaa; }
        .loading { text-align: center; padding: 3rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 owockibot Safe Transaction Viewer</h1>
            <div class="safe-address">0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be</div>
        </header>
        
        <div class="live-notice">🔴 LIVE DATA - Using Safe Transaction Service API</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTx">-</div>
                <div class="stat-label">Total TX</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="executed">-</div>
                <div class="stat-label">Executed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pending">-</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="transactions">
            <div class="tx-header">
                <div>Date</div>
                <div>Type</div>
                <div>Hash</div>
                <div>To</div>
                <div>Status</div>
            </div>
            <div id="txList"><div class="loading">Loading transactions...</div></div>
        </div>
    </div>

    <script>
        const SAFE_ADDRESS = '0x26B7805Dd8aEc26DA55fc8e0c659cf6822b740Be';
        const SAFE_API = 'https://safe-transaction-base.safe.global/api/v1';
        const BASESCAN_URL = 'https://basescan.org/tx/';
        
        const API_TOKEN = 'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzYWZlLWF1dGgtc2VydmljZSIsInN1YiI6IjY2YTZjNjQ5MDU3ODRmOGJhNWY2ZmRhYTA0NzM0NTdmXzZkMDVjZmMyYWI0NjQ1ZjlhMzlkMDYwYzE3NjNjNTMwIiwia2V5IjoiNjZhNmM2NDkwNTc4NGY4YmE1ZjZmZGFhMDQ3MzQ1N2ZfNmQwNWNmYzJhYjQ2NDVmOWEzOWQwNjBjMTc2M2M1MzAiLCJhdWQiOlsic2FmZS1hdXRoLXNlcnZpY2UiXSwiZXhwIjoxODAzODM5MzAxLCJyb2xlcyI6W10sImRhdGEiOnt9fQ.cg-GcUW0otyqXIkjTcKzBUrzLW6X7XJVP2QRseypW1nFbp4nxYL_SnuOd6v55keCJFYIfe6oK2OdiZYYpspnlQ';

        async function fetchSafeTransactions() {
            const headers = {
                'Authorization': `Bearer ${API_TOKEN}`,
                'Content-Type': 'application/json'
            };
            
            try {
                const response = await fetch(`${SAFE_API}/safes/${SAFE_ADDRESS}/all-transactions/?limit=50`, { headers });
                const data = await response.json();
                return data.results || [];
            } catch (error) {
                console.error('Error:', error);
                return [];
            }
        }

        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function truncateHash(hash) {
            if (!hash) return '-';
            return hash.slice(0, 8) + '...' + hash.slice(-6);
        }

        function renderTransactions(txs) {
            const txList = document.getElementById('txList');
            if (!txs || txs.length === 0) {
                txList.innerHTML = '<div class="loading">No transactions found</div>';
                return;
            }

            let executed = 0;
            let pending = 0;

            const html = txs.map(tx => {
                const isExecuted = tx.executionDate != null;
                if (isExecuted) executed++; else pending++;
                
                const typeClass = isExecuted ? 'type-executed' : 'type-pending';
                const statusLabel = isExecuted ? 'EXECUTED' : 'PENDING';
                const hash = tx.transactionHash || tx.safeTxHash;
                
                let amount = '-';
                if (tx.value) {
                    const ethValue = parseInt(tx.value) / 1e18;
                    amount = ethValue.toFixed(4) + ' ETH';
                }
                
                return `
                    <div class="tx-row">
                        <div>${formatDate(tx.executionDate || tx.submissionDate)}</div>
                        <div><span class="tx-type ${typeClass}">${tx.txType}</span></div>
                        <div><a href="${BASESCAN_URL}${hash}" target="_blank" class="tx-hash">${truncateHash(hash)}</a></div>
                        <div class="recipient">${truncateHash(tx.to || tx.safe)}</div>
                        <div><span class="tx-type ${typeClass}">${statusLabel}</span></div>
                    </div>
                `;
            }).join('');

            txList.innerHTML = html;
            document.getElementById('totalTx').textContent = txs.length;
            document.getElementById('executed').textContent = executed;
            document.getElementById('pending').textContent = pending;
        }

        async function init() {
            const txs = await fetchSafeTransactions();
            renderTransactions(txs);
        }
        init();
    </script>
</body>
</html>
